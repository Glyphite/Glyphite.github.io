<script>
fetch('/search.json').then(r=>r.json()).then(data=>{
  const input = document.getElementById('search-input');
  const results = document.getElementById('search-results');
  input.addEventListener('input', e=>{
    const q = e.target.value.toLowerCase();
    const hits = data.filter(p => p.title.toLowerCase().includes(q) || (p.content||'').toLowerCase().includes(q));
    results.innerHTML = hits.map(p=>`<div style="margin:10px 0"><a href="${p.url}">${p.title}</a><div style="color:#888;font-size:0.8em">${(p.content||'').slice(0,100)}</div></div>`).join('') || '<p style="color:#999">无结果</p>';
  });
});
